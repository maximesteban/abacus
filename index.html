<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espai Vi Priorat — Demo interactiu</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --wine: #6B1E2B;
    --wine-dark: #3D0F18;
    --wine-light: #A13044;
    --cream: #F5EBD8;
    --cream-dark: #E8D9BC;
    --gold: #C9A961;
    --earth: #3D2817;
    --ink: #1F1410;
    --green: #4A6B3A;
    --shadow: 0 20px 60px rgba(61,15,24,.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #2a1a12;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    padding: 20px;
  }

  .switcher {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(10px);
    padding: 6px;
    border-radius: 100px;
    display: flex;
    gap: 4px;
    border: 1px solid rgba(255,255,255,.1);
  }
  .switcher button {
    background: transparent;
    border: none;
    color: rgba(255,255,255,.6);
    padding: 10px 22px;
    border-radius: 100px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .02em;
    transition: all .2s;
  }
  .switcher button.active {
    background: var(--gold);
    color: var(--earth);
  }

  .stage {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 40px);
    padding-top: 60px;
  }

  .totem {
    width: 540px;
    height: 960px;
    max-height: calc(100vh - 120px);
    background: var(--cream);
    border-radius: 32px;
    box-shadow: var(--shadow), inset 0 0 0 10px #111, inset 0 0 0 14px #2a1a12;
    position: relative;
    overflow: hidden;
    display: none;
  }
  .totem.active { display: block; }
  .totem::before {
    content: '';
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    z-index: 10;
  }
  .totem-inner {
    position: absolute;
    inset: 14px;
    border-radius: 22px;
    overflow: hidden;
    background: var(--cream);
  }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    padding: 40px 32px;
    animation: fadeIn .4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #screen-welcome {
    background: linear-gradient(160deg, var(--wine) 0%, var(--wine-dark) 100%);
    color: var(--cream);
    justify-content: space-between;
    text-align: center;
    padding: 60px 32px;
    cursor: pointer;
  }
  .welcome-logo {
    font-size: 11px;
    letter-spacing: .4em;
    opacity: .7;
    margin-top: 20px;
  }
  .welcome-hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
  }
  .welcome-hero h1 {
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -.02em;
  }
  .welcome-hero h1 em {
    color: var(--gold);
    font-style: normal;
    display: block;
  }
  .welcome-sub {
    font-size: 20px;
    opacity: .85;
    max-width: 360px;
    line-height: 1.4;
  }
  .welcome-cta {
    background: var(--gold);
    color: var(--earth);
    padding: 22px 40px;
    border-radius: 100px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    animation: pulse 2s infinite;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .grape-decor {
    position: absolute;
    opacity: .08;
    font-size: 260px;
    bottom: -40px;
    right: -40px;
    transform: rotate(15deg);
    pointer-events: none;
  }

  #screen-onboarding {
    background: linear-gradient(160deg, var(--wine) 0%, var(--wine-dark) 100%);
    padding: 0;
  }
  .onboarding-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(30,10,15,.7);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .onboarding-card {
    background: var(--cream);
    border-radius: 24px;
    padding: 36px 32px;
    width: 100%;
    max-width: 440px;
    max-height: 90%;
    overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
  }
  .onboarding-badge {
    display: inline-block;
    background: var(--wine);
    color: var(--cream);
    font-size: 11px;
    letter-spacing: .2em;
    padding: 6px 14px;
    border-radius: 100px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .onboarding-card h2 {
    font-size: 32px;
    color: var(--wine-dark);
    line-height: 1.1;
    margin-bottom: 16px;
    letter-spacing: -.02em;
  }
  .onboarding-card p {
    font-size: 16px;
    color: #5a4438;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .onboarding-steps {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }
  .onboarding-steps li {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    color: var(--earth);
  }
  .step-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--wine);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
  }

  #screen-menu {
    background: var(--cream);
    padding: 40px 28px;
    gap: 20px;
  }
  .menu-head {
    text-align: center;
    margin-bottom: 10px;
  }
  .menu-head .eyebrow {
    font-size: 11px;
    letter-spacing: .3em;
    color: var(--wine);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .menu-head h2 {
    font-size: 38px;
    color: var(--wine-dark);
    line-height: 1;
    letter-spacing: -.02em;
  }
  .menu-option {
    flex: 1;
    border-radius: 20px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    cursor: pointer;
    transition: transform .2s;
    position: relative;
    overflow: hidden;
    color: white;
    min-height: 220px;
  }
  .menu-option:hover { transform: translateY(-4px); }
  .menu-option.a { background: linear-gradient(135deg, #4A6B3A 0%, #2c4222 100%); }
  .menu-option.b { background: linear-gradient(135deg, var(--wine) 0%, var(--wine-dark) 100%); }
  .menu-option .icon-big {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 56px;
    opacity: .3;
  }
  .menu-option .tag {
    font-size: 11px;
    letter-spacing: .2em;
    opacity: .7;
    margin-bottom: 8px;
  }
  .menu-option h3 {
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: -.01em;
  }
  .menu-option p {
    font-size: 14px;
    opacity: .9;
    line-height: 1.4;
  }

  .question {
    background: var(--cream);
    padding: 50px 28px 32px;
    gap: 16px;
  }
  .q-progress {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }
  .q-progress span {
    flex: 1;
    height: 4px;
    background: var(--cream-dark);
    border-radius: 4px;
  }
  .q-progress span.done { background: var(--wine); }
  .q-progress span.current { background: var(--gold); }
  .q-eyebrow {
    font-size: 11px;
    letter-spacing: .3em;
    color: var(--wine);
    font-weight: 700;
  }
  .q-title {
    font-size: 36px;
    color: var(--wine-dark);
    line-height: 1;
    margin-bottom: 24px;
    letter-spacing: -.02em;
  }
  .q-options {
    display: grid;
    gap: 12px;
    flex: 1;
  }
  .q-options.g4 { grid-template-columns: 1fr 1fr; }
  .q-options.g3 { grid-template-columns: 1fr; }
  .q-opt {
    background: white;
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 20px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
    text-align: center;
  }
  .q-options.g3 .q-opt {
    flex-direction: row;
    justify-content: flex-start;
    padding-left: 26px;
  }
  .q-opt:hover { border-color: var(--gold); transform: translateY(-2px); }
  .q-opt.selected {
    background: var(--wine);
    color: var(--cream);
    border-color: var(--wine);
  }
  .q-opt .emoji { font-size: 40px; }
  .q-options.g3 .q-opt .emoji { font-size: 28px; }
  .q-opt .label {
    font-size: 17px;
    font-weight: 700;
  }
  .q-opt .sub {
    font-size: 12px;
    opacity: .6;
  }
  .q-back {
    background: transparent;
    border: none;
    color: var(--wine);
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    padding: 8px 0;
    font-weight: 600;
  }

  #screen-map {
    padding: 0;
    background: var(--cream);
  }
  .map-header {
    padding: 20px 24px 14px;
    background: var(--cream);
    border-bottom: 1px solid var(--cream-dark);
    position: relative;
    z-index: 20;
  }
  .map-header .h-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .map-header h3 {
    font-size: 22px;
    color: var(--wine-dark);
    letter-spacing: -.01em;
  }
  .map-header .subhead {
    font-size: 12px;
    color: #7a6055;
  }
  .map-canvas {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #d4c39c;
  }
  #leaflet-map {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  .leaflet-container {
    background: #e8dfc9 !important;
    font-family: inherit !important;
  }
  .leaflet-control-attribution {
    font-size: 8px !important;
    background: rgba(255,255,255,.7) !important;
    padding: 2px 5px !important;
  }
  .leaflet-control-zoom {
    border: none !important;
    box-shadow: 0 4px 10px rgba(0,0,0,.15) !important;
  }
  .leaflet-control-zoom a {
    background: white !important;
    color: var(--wine) !important;
    border: none !important;
    font-weight: 700 !important;
  }
  .lmap-pin-wrap {
    position: relative;
    width: 40px;
    height: 48px;
  }
  .lmap-pin-body {
    position: absolute;
    top: 0;
    left: 50%;
    margin-left: -18px;
    width: 36px;
    height: 36px;
    background: var(--wine);
    border: 3px solid white;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 4px 10px rgba(0,0,0,.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .lmap-pin-body > span {
    transform: rotate(45deg);
    font-size: 16px;
    line-height: 1;
    display: block;
  }
  .lmap-pin-body:hover { transform: rotate(-45deg) scale(1.15); }
  .lmap-pin-wrap.selected .lmap-pin-body {
    background: var(--gold);
    box-shadow: 0 0 0 4px rgba(201,169,97,.5), 0 4px 10px rgba(0,0,0,.4);
  }
  .lmap-pin-wrap.start .lmap-pin-body {
    background: var(--green);
    width: 42px;
    height: 42px;
    margin-left: -21px;
    border-width: 4px;
  }
  .lmap-pin-wrap.start .lmap-pin-body > span { font-size: 18px; }
  .lmap-pin-wrap.start::after {
    content: 'ESPAI VI';
    position: absolute;
    top: 46px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  .map-footer {
    padding: 14px 20px;
    background: white;
    border-top: 1px solid var(--cream-dark);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 20;
    position: relative;
  }
  .map-counter {
    flex: 1;
    font-size: 13px;
    color: var(--earth);
  }
  .map-counter strong {
    color: var(--wine);
    font-size: 20px;
    display: block;
  }
  .btn-primary {
    background: var(--wine);
    color: var(--cream);
    border: none;
    padding: 14px 24px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: .03em;
    transition: all .2s;
  }
  .btn-primary:disabled {
    background: #c4b59e;
    cursor: not-allowed;
  }
  .btn-primary:not(:disabled):hover { background: var(--wine-dark); }
  .poi-card {
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 16px;
    background: white;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,.3);
    z-index: 900;
    display: none;
  }
  .poi-card.visible { display: block; }
  .poi-card .close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--cream);
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--earth);
  }
  .poi-tag {
    display: inline-block;
    background: var(--cream);
    color: var(--wine);
    font-size: 10px;
    letter-spacing: .2em;
    padding: 4px 10px;
    border-radius: 100px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .poi-card h3 {
    font-size: 22px;
    color: var(--wine-dark);
    margin-bottom: 8px;
    letter-spacing: -.01em;
  }
  .poi-card .desc {
    font-size: 14px;
    color: #5a4438;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .poi-card .curio {
    background: var(--cream);
    border-left: 3px solid var(--gold);
    padding: 10px 12px;
    border-radius: 0 8px 8px 0;
    font-size: 12px;
    color: var(--earth);
    line-height: 1.4;
    margin-bottom: 14px;
  }
  .poi-card .curio strong {
    color: var(--wine);
    display: block;
    margin-bottom: 2px;
    letter-spacing: .08em;
    font-size: 10px;
  }
  .poi-actions {
    display: flex;
    gap: 8px;
  }
  .btn-secondary {
    background: var(--cream);
    color: var(--wine);
    border: 2px solid var(--cream-dark);
    padding: 12px 18px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    flex: 1;
  }
  .btn-add {
    background: var(--wine);
    color: var(--cream);
    border: none;
    padding: 12px 18px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    flex: 2;
  }
  .btn-add.added { background: var(--green); }

  #screen-route {
    background: var(--cream);
    padding: 40px 28px 24px;
    gap: 16px;
  }
  #screen-route h2 {
    font-size: 34px;
    color: var(--wine-dark);
    letter-spacing: -.02em;
    line-height: 1;
  }
  .route-story {
    background: white;
    border-radius: 16px;
    padding: 18px;
    font-size: 14px;
    color: var(--earth);
    line-height: 1.5;
    border-left: 4px solid var(--gold);
  }
  .route-story em { color: var(--wine); }
  .route-stops {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .route-stop {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .stop-num {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--wine);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .stop-name {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: var(--earth);
  }
  .stop-icon { font-size: 22px; }

  #screen-qr {
    background: linear-gradient(160deg, var(--wine) 0%, var(--wine-dark) 100%);
    color: var(--cream);
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 32px;
    gap: 20px;
  }
  #screen-qr .eyebrow {
    font-size: 11px;
    letter-spacing: .3em;
    opacity: .7;
  }
  #screen-qr h2 {
    font-size: 32px;
    letter-spacing: -.02em;
    line-height: 1.1;
    max-width: 360px;
  }
  .qr-wrap {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .route-id {
    font-family: "SF Mono", monospace;
    font-size: 18px;
    letter-spacing: .15em;
    background: rgba(0,0,0,.3);
    padding: 10px 18px;
    border-radius: 10px;
    color: var(--gold);
  }
  .qr-hint {
    font-size: 14px;
    opacity: .8;
    max-width: 320px;
    line-height: 1.4;
  }
  .qr-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .btn-ghost {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.2);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 100px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }

  .mobile {
    width: 380px;
    height: 780px;
    max-height: calc(100vh - 120px);
    background: #111;
    border-radius: 48px;
    padding: 14px;
    box-shadow: var(--shadow);
    position: relative;
    display: none;
  }
  .mobile.active { display: block; }
  .mobile::after {
    content: '';
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }
  .mobile-inner {
    background: var(--cream);
    border-radius: 36px;
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }
  .m-screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    animation: fadeIn .4s ease;
  }
  .m-screen.active { display: flex; }

  .m-entry {
    background:
      radial-gradient(circle at top right, rgba(201,169,97,.28), transparent 34%),
      linear-gradient(180deg, #f7f0e7 0%, #efe4d6 100%);
    padding: 70px 22px 22px;
    color: var(--earth);
    justify-content: space-between;
  }
  .m-entry-top .eyebrow {
    font-size: 10px;
    letter-spacing: .3em;
    color: var(--wine);
    font-weight: 700;
    margin-bottom: 10px;
  }
  .m-entry-top h2 {
    font-size: 30px;
    line-height: 1.05;
    color: var(--wine-dark);
    margin-bottom: 12px;
  }
  .m-entry-top p {
    font-size: 14px;
    line-height: 1.5;
    color: #6d5446;
    max-width: 280px;
  }
  .m-entry-card {
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(107,30,43,.08);
    box-shadow: 0 18px 40px rgba(61,40,23,.12);
    border-radius: 24px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .m-scan-btn {
    width: 100%;
    border: none;
    background: #805036;
    color: white;
    border-radius: 18px;
    padding: 16px 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-align: left;
  }
  .m-scan-btn span small {
    display: block;
    font-size: 11px;
    font-weight: 500;
    opacity: .8;
    margin-top: 3px;
  }
  .m-entry-card label {
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--wine);

      poi_added: "✓ In route",
      // Mobile
      mobile_eyebrow: "FALSET ESPAI VI · WEB APP",
      mobile_title: "Continue your route",
      mobile_sub: "Scan your QR or enter your code to open your route and continue discovering the territory.",
      scan_button: "Scan QR",
      scan_sub: "Open your route instantly",
      code_label: "ACCESS CODE",
      code_placeholder: "E.g. FALSET-2384",
      hint: "Your access is saved with your route code to resume the experience whenever you want.",
      enter_button: "Enter the route",
      example_button: "Use example access",
      overview_title: "Main domain",
      overview_name: "Falset Espai Vi",
      overview_story: "When you arrive at each place, its domain will unlock and open as its own screen within the experience.",
      section_label: "DOMAINS YOU CAN UNLOCK",
      stop_prefix: "DOMAIN",
      stop_state_locked: "Locked",
      stop_state_unlocked: "Visible",
      button_how: "How to get there",
      button_open: "Open place",
      detail_locked_title: "This domain is still locked",
      detail_locked_desc: "When the user arrives physically, this screen changes and loads the own experience of the unlocked place.",
      detail_distance: "You are at",
      detail_how_button: "How to get there",
      detail_sim_button: "Simulate arrival",
      detail_sim_small: "(DEMO)",
      detail_unlocked_cat: "UNLOCKED DOMAIN",
      detail_what: "What is it?",
      detail_next: "Next step",
      detail_next_desc: "From here you can return to the main domain or continue unlocking the rest of the route.",
      unlocked_badge: "UNLOCKED",
      place_context_label: "MAIN DOMAIN ALWAYS VISIBLE",
      place_context_strong: "Falset Espai Vi",
      place_context_span: "Now the user is already inside the domain of the place and not just in the general view of the route.",
      stop_count_label: "domains",
      // Additional translations
      build_story: {
        prefix: "From <em>Falset Espai Vi</em> you can open a route of <em>",
        mid: " domains</em> and unlock ",
        interests: {
          gastronomia: 'flavors and experiences',
          cultura: 'heritage and history',
          natura: 'landscape and environment',
          aventura: 'active route'
        },
        default_interest: 'connected places',
        paces: {
          tranquil: 'with a tranquil pace',
          actiu: 'with more movement',
          familiar: 'designed to share'
        },
        default_pace: '',
        suffix: '. Each place activates upon arrival and changes from locked view to own experience.'
      },
      route_titles: {
        default: 'Falset Route',
        gastronomia: 'Flavors and places',
        cultura: 'Unlockable heritage',
        natura: 'Landscape and environment',
        aventura: 'Route in motion',
        other: 'Place experience'
      },
      curio_label: 'DID YOU KNOW?',
      directions_alert: 'How to get to {name}\n\nIn the real app here we would open the browser or an external map.',
      route_prefix: 'ROUTE · '
    }
  };

  let leafletMap, markerLayer;

  function goTo(screenId) {
    document.querySelectorAll('#totem .screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + screenId).classList.add('active');
    if (screenId === 'map') renderMap();
    if (screenId === 'route') renderRoute();
  }

  function goMobile(screenId) {
    document.querySelectorAll('#mobile .m-screen').forEach(s => s.classList.remove('active'));
    document.getElementById('m-' + screenId).classList.add('active');
  }

  document.querySelectorAll('.switcher button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.switcher button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const v = b.dataset.view;
      state.view = v;
      document.getElementById('totem').classList.toggle('active', v === 'totem');
      document.getElementById('mobile').classList.toggle('active', v === 'mobile');
    });
  });

  document.querySelectorAll('.lang-select button').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      setLanguage(b.dataset.lang);
    });
  });

  function startRoute(mode) {
    state.mode = mode;
    state.selected.clear();
    if (mode === 'explore') {
      state.interest = null;
      state.pace = null;
      state.time = null;
      goTo('map');
    } else {
      goTo('q1');
    }
  }

  function answer(key, value, el) {
    state[key] = value;
    el.parentElement.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    setTimeout(() => {
      if (key === 'interest') goTo('q2');
      else if (key === 'pace') goTo('q3');
      else if (key === 'time') goTo('map');
    }, 250);
  }

  function filteredPois() {
    if (state.mode === 'explore' || !state.interest) return POIS;
    return POIS.filter(p => p.cats.includes(state.interest));
  }

  function initLeaflet() {
    if (leafletMap) return;
    leafletMap = L.map('leaflet-map', {
      center: [41.205, 0.82],
      zoom: 11,
      minZoom: 10,
      maxZoom: 15,
      zoomControl: true,
      attributionControl: true,
      scrollWheelZoom: true,
    });
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenTopoMap · © OpenStreetMap',
      maxZoom: 17,
    }).addTo(leafletMap);
    markerLayer = L.layerGroup().addTo(leafletMap);
  }

  function renderMap() {
    initLeaflet();
    setTimeout(() => leafletMap.invalidateSize(), 50);
    markerLayer.clearLayers();
    addMarker(START, true);
    filteredPois().forEach(p => addMarker(p, false));
    updateCounter();

    const t = translations[currentLang];
    const n = filteredPois().length;
    const interestTxt = state.interest ? `(${state.interest})` : '';
    document.getElementById('map-subhead').textContent =
      state.mode === 'explore'
        ? `${POIS.length} ${t.map_sub_all}`
        : `${n} ${t.map_sub_filtered} ${interestTxt}`;
  }

  function addMarker(p, isStart) {
    const classes = ['lmap-pin-wrap'];
    if (isStart) classes.push('start');
    if (!isStart && state.selected.has(p.id)) classes.push('selected');

    const icon = L.divIcon({
      className: classes.join(' '),
      html: `<div class="lmap-pin-body"><span>${p.icon}</span></div>`,
      iconSize: [40, 48],
      iconAnchor: [20, 40],
    });
    const marker = L.marker([p.lat, p.lng], { icon, riseOnHover: true }).addTo(markerLayer);
    if (!isStart) marker.on('click', () => openPoi(p));
  }

  function openPoi(p) {
    const t = translations[currentLang];
    const card = document.getElementById('poi-card');
    const content = document.getElementById('poi-content');
    const added = state.selected.has(p.id);
    const catsTxt = p.cats.map(c => c.toUpperCase()).join(' · ');
    content.innerHTML = `
      <span class="poi-tag">${catsTxt}</span>
      <h3>${p.icon} ${p.name}</h3>
      <p class="desc">${p.desc}</p>
      <div class="curio"><strong>${t.curio_label}</strong>${p.curio}</div>
      <div class="poi-actions">
        <button class="btn-secondary" onclick="closePoi()">${t.poi_back}</button>
        <button class="btn-add ${added ? 'added' : ''}" onclick="toggleSelect('${p.id}')">${added ? t.poi_added : t.poi_add}</button>
      </div>
    `;
    card.classList.add('visible');
  }

  function closePoi() {
    document.getElementById('poi-card').classList.remove('visible');
  }

  window.toggleSelect = function(id) {
    if (state.selected.has(id)) state.selected.delete(id);
    else state.selected.add(id);
    renderMap();
    closePoi();
  };

  function updateCounter() {
    const t = translations[currentLang];
    const n = state.selected.size;
    document.getElementById('selected-count').textContent = n;
    document.getElementById('selected-count').nextSibling.textContent = ` ${t.selected_count}`;
    document.getElementById('btn-finish').textContent = t.finish_button;
    document.getElementById('btn-finish').disabled = n === 0;
  }

  function stopRow(num, p, isStart) {
    return `
      <div class="route-stop">
        <div class="stop-num" ${isStart ? 'style="background:var(--green)"' : ''}>${isStart ? '▸' : num}</div>
        <div class="stop-name">${p.name}</div>
        <div class="stop-icon">${p.icon}</div>
      </div>
    `;
  }

  function buildStory(stops) {
    const t = translations[currentLang].build_story;
    const interestTxt = t.interests[state.interest] || t.default_interest;
    const paceTxt = t.paces[state.pace] || t.default_pace;
    return `${t.prefix}${stops.length}${t.mid}${interestTxt} ${paceTxt}${t.suffix}`;
  }

  function renderRoute() {
    const stops = Array.from(state.selected).map(id => POIS.find(p => p.id === id));
    const container = document.getElementById('route-stops');
    container.innerHTML = stopRow(0, START, true) + stops.map((s, i) => stopRow(i + 1, s, false)).join('');
    document.getElementById('route-story').innerHTML = buildStory(stops);
  }

  function generateQR() {
    state.routeId = 'FALSET-' + Math.floor(1000 + Math.random() * 9000);
    const url = `https://espaivi.local/r/${state.routeId}`;
    const wrap = document.getElementById('qr-wrap');
    wrap.innerHTML = '';
    new QRCode(wrap, {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#3D0F18',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
    document.getElementById('route-id').textContent = 'RUTA · ' + state.routeId;
  }

  function getDistanceLabel(index) {
    const distances = ['2,3 km', '4,1 km', '6,8 km', '8,4 km', '11,2 km'];
    return distances[index] || `${(2.3 + (index * 1.7)).toFixed(1).replace('.', ',')} km`;
  }

  function routeTitle(stops) {
    const t = translations[currentLang].route_titles;
    if (stops.length === 0) return t.default;
    return t[state.interest] || t.other;
  }

  function ensureMobileRoute() {
    if (state.selected.size === 0) {
      ['cooperativa', 'cartoixa', 'porrera', 'montsant'].forEach(id => state.selected.add(id));
      state.interest = 'cultura';
      state.time = '3-4';
      state.routeId = 'FALSET-DEMO';
    }
  }

  function loadMobileRoute() {
    const t = translations[currentLang];
    state.mobileReady = true;
    const stops = Array.from(state.selected).map(id => POIS.find(p => p.id === id));
    if (!state.routeId) state.routeId = 'FALSET-DEMO';

    document.getElementById('m-route-code').textContent = t.route_prefix + state.routeId;
    document.getElementById('m-count').textContent = stops.length;
    document.getElementById('m-time').textContent = state.time ? state.time + 'h' : '3-4h';
    document.getElementById('m-route-title').textContent = routeTitle(stops);
    document.getElementById('m-story').innerHTML = buildStory(stops);

    const list = document.getElementById('m-stops');
    list.innerHTML = '';
    stops.forEach((s, i) => {
      const unlocked = state.unlocked.has(s.id);
      const distance = getDistanceLabel(i);
      const el = document.createElement('div');
      el.className = 'm-stop ' + (unlocked ? 'unlocked' : 'locked');
      el.innerHTML = `
        <div class="m-stop-top">
          <div class="ic">${s.icon}</div>
          <div class="info">
            <div class="n">${t.stop_prefix} ${i + 1}</div>
            <div class="t">${s.name}</div>
            <div class="s">${s.short}</div>
          </div>
          <div class="state">${unlocked ? t.stop_state_unlocked : t.stop_state_locked}</div>
        </div>
        <div class="m-stop-foot">
          <div class="distance">📍 ${distance}</div>
          <button type="button" onclick="event.stopPropagation(); ${unlocked ? `openMobileStop('${s.id}')` : `openDirections('${s.id}')`}">${unlocked ? t.button_open : t.button_how}</button>
        </div>
      `;
      el.addEventListener('click', () => openMobileStop(s.id));
      list.appendChild(el);
    });
    goMobile('overview');
  }

  function openMobileStop(id) {
    const t = translations[currentLang];
    const p = POIS.find(x => x.id === id);
    const orderedStops = Array.from(state.selected);
    const stopIndex = orderedStops.indexOf(id);
    const distance = getDistanceLabel(Math.max(stopIndex, 0));
    state.currentStop = id;
    const unlocked = state.unlocked.has(id);
    const detail = document.getElementById('m-detail');

    if (!unlocked) {
      detail.innerHTML = `
        <div class="m-detail-shell">
          <div class="m-detail-head">
            <button class="m-back" onclick="goMobile('overview')">←</button>
            <div class="cat">${p.cats[0].toUpperCase()}</div>
            <h2>${p.name}</h2>
          </div>
          <div class="m-detail-body">
            <div class="m-place-context">
              <div class="label">${t.place_context_label}</div>
              <strong>${t.place_context_strong}</strong>
              <span>${t.place_context_span}</span>
            </div>
            <div class="m-locked-box">
              <div class="lock-icon">🔒</div>
              <h3>${t.detail_locked_title}</h3>
              <p>${t.detail_locked_desc}</p>
              <div class="distance">📍 ${t.detail_distance} ${distance}</div>
              <div class="m-locked-actions">
                <button class="m-outline-btn" onclick="openDirections('${p.id}')">${t.detail_how_button}</button>
                <button class="m-sim-btn" onclick="simulateArrival()">
                  ${t.detail_sim_button}
                  <small>${t.detail_sim_small}</small>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    } else {
      detail.innerHTML = `
        <div class="m-detail-shell">
          <div class="m-detail-head">
            <button class="m-back" onclick="goMobile('overview')">←</button>
            <div class="cat">${t.detail_unlocked_cat}</div>
            <h2>${p.name}</h2>
          </div>
          <div class="m-detail-body m-content">
            <div class="m-place-context">
              <div class="label">${t.place_context_label}</div>
              <strong>${t.place_context_strong}</strong>
              <span>${t.place_context_span}</span>
            </div>
            <span class="m-unlocked-badge">${t.unlocked_badge}</span>
            <div class="bigimg">${p.icon}</div>
            <h3>${t.detail_what}</h3>
            <p>${p.desc}</p>
            <div class="curio">
              <strong>SABIES QUÈ?</strong>
              ${p.curio}
            </div>
            <h3>${t.detail_next}</h3>
            <p>${t.detail_next_desc}</p>
          </div>
        </div>
      `;
    }
    goMobile('detail');
  }

  function openMobileEntry() {
    const input = document.getElementById('m-route-input');
    ensureMobileRoute();
    if (input.value.trim()) state.routeId = input.value.trim().toUpperCase();
    loadMobileRoute();
  }

  function openDirections(id) {
    const t = translations[currentLang];
    const p = POIS.find(x => x.id === id);
    if (!p) return;
    alert(t.directions_alert.replace('{name}', p.name));
  }

  function simulateScan() {
    ensureMobileRoute();
    document.querySelector('.switcher button[data-view="mobile"]').click();
    loadMobileRoute();
  }

  window.simulateArrival = function() {
    if (state.currentStop) {
      state.unlocked.add(state.currentStop);
      loadMobileRoute();
      openMobileStop(state.currentStop);
    }
  };

  function resetDemo() {
    state = {
      view: state.view,
      interest: null,
      pace: null,
      time: null,
      mode: 'build',
      selected: new Set(),
      routeId: null,
      unlocked: new Set(),
      currentStop: null,
      mobileReady: false,
    };
    currentLang = 'ca';
    document.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
    document.getElementById('m-route-input').value = '';
    goTo('welcome');
    if (state.view === 'mobile') goMobile('entry');
    setLanguage(currentLang);
  }

  function setLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];
    // Update switcher labels
    document.querySelector('.switcher button[data-view="totem"]').innerHTML = t.totem_label;
    document.querySelector('.switcher button[data-view="mobile"]').innerHTML = t.mobile_label;
    // Update dev reset
    document.querySelector('.dev-reset').textContent = t.reset;
    // Update lang-select active
    document.querySelectorAll('.lang-select button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    // Update welcome
    document.querySelector('#screen-welcome h1').innerHTML = t.welcome_title;
    document.querySelector('#screen-welcome .welcome-sub').textContent = t.welcome_sub;
    document.querySelector('#screen-welcome .welcome-cta').textContent = t.welcome_cta;
    // Onboarding
    document.querySelector('#screen-onboarding .onboarding-badge').textContent = t.onboarding_badge;
    document.querySelector('#screen-onboarding h2').textContent = t.onboarding_title;
    document.querySelector('#screen-onboarding p').textContent = t.onboarding_desc;
    const steps = document.querySelectorAll('#screen-onboarding .step-num');
    t.onboarding_steps.forEach((step, i) => {
      steps[i].nextSibling.textContent = step;
    });
    document.querySelector('#screen-onboarding .btn-primary').textContent = t.onboarding_button;
    // Menu
    document.querySelector('#screen-menu .menu-head .eyebrow').textContent = t.menu_eyebrow;
    document.querySelector('#screen-menu .menu-head h2').textContent = t.menu_title;
    const options = document.querySelectorAll('#screen-menu .menu-option');
    options[0].querySelector('.tag').textContent = t.menu_option_a_tag;
    options[0].querySelector('h3').textContent = t.menu_option_a_title;
    options[0].querySelector('p').textContent = t.menu_option_a_desc;
    options[1].querySelector('.tag').textContent = t.menu_option_b_tag;
    options[1].querySelector('h3').textContent = t.menu_option_b_title;
    options[1].querySelector('p').textContent = t.menu_option_b_desc;
    // Questions
    document.querySelector('#screen-q1 .q-eyebrow').textContent = t.q1_eyebrow;
    document.querySelector('#screen-q1 .q-title').textContent = t.q1_title;
    const q1opts = document.querySelectorAll('#screen-q1 .q-opt');
    t.q1_options.forEach((opt, i) => {
      q1opts[i].querySelector('.emoji').textContent = opt.emoji;
      q1opts[i].querySelector('.label').textContent = opt.label;
      q1opts[i].querySelector('.sub').textContent = opt.sub;
    });
    document.getElementById('q2-back').textContent = t.back;
    document.querySelector('#screen-q2 .q-eyebrow').textContent = t.q2_eyebrow;
    document.querySelector('#screen-q2 .q-title').textContent = t.q2_title;
    const q2opts = document.querySelectorAll('#screen-q2 .q-opt');
    t.q2_options.forEach((opt, i) => {
      q2opts[i].querySelector('.emoji').textContent = opt.emoji;
      q2opts[i].querySelector('.label').textContent = opt.label;
      q2opts[i].querySelector('.sub').textContent = opt.sub;
    });
    document.getElementById('q3-back').textContent = t.back;
    document.querySelector('#screen-q3 .q-eyebrow').textContent = t.q3_eyebrow;
    document.querySelector('#screen-q3 .q-title').textContent = t.q3_title;
    const q3opts = document.querySelectorAll('#screen-q3 .q-opt');
    t.q3_options.forEach((opt, i) => {
      q3opts[i].querySelector('.emoji').textContent = opt.emoji;
      q3opts[i].querySelector('.label').textContent = opt.label;
      q3opts[i].querySelector('.sub').textContent = opt.sub;
    });
    // Map
    document.getElementById('map-title').textContent = t.map_title;
    document.getElementById('map-subhead').textContent = t.map_sub_all;
    document.getElementById('map-reset').textContent = t.reset;
    document.getElementById('map-back').textContent = t.back;
    document.getElementById('selected-label').textContent = t.selected_count;
    document.getElementById('btn-finish').textContent = t.finish_button;
    // Route
    document.getElementById('route-reset').textContent = t.reset;
    document.getElementById('route-back-map').textContent = t.route_back;
    document.getElementById('route-eyebrow').textContent = t.route_eyebrow;
    document.getElementById('route-title').textContent = t.route_title;
    document.getElementById('route-generate').textContent = t.qr_button;
    // QR
    document.getElementById('qr-eyebrow').textContent = t.qr_eyebrow;
    document.getElementById('qr-title').textContent = t.qr_title;
    document.getElementById('qr-hint').textContent = t.qr_hint;
    document.getElementById('qr-new-route').textContent = t.new_route;
    document.getElementById('qr-simulate').innerHTML = `📱 ${t.simulate_scan}`;
    // Mobile entry
    document.getElementById('m-eyebrow').textContent = t.mobile_eyebrow;
    document.getElementById('m-title').textContent = t.mobile_title;
    document.getElementById('m-sub').textContent = t.mobile_sub;
    document.getElementById('m-scan-text').innerHTML = `${t.scan_button}<small id="m-scan-sub">${t.scan_sub}</small>`;
    document.querySelector('label[for="m-route-input"]').textContent = t.code_label;
    document.getElementById('m-route-input').placeholder = t.code_placeholder;
    document.getElementById('m-entry-hint').textContent = t.hint;
    document.getElementById('m-enter').textContent = t.enter_button;
    document.getElementById('m-example').textContent = t.example_button;
    document.getElementById('m-overview-title').textContent = t.overview_title;
    document.getElementById('m-overview-name').textContent = t.overview_name;
    document.getElementById('m-count-label').textContent = t.stop_count_label;
    document.getElementById('m-section-label').textContent = t.section_label;
  }

  window.resetDemo = resetDemo;
  window.goTo = goTo;
  window.startRoute = startRoute;
  window.answer = answer;
  window.generateQR = generateQR;
  window.simulateScan = simulateScan;
  window.closePoi = closePoi;
  window.openMobileEntry = openMobileEntry;
  window.openDirections = openDirections;

  setLanguage(currentLang);

  document.querySelector('.switcher button[data-view="mobile"]').addEventListener('click', () => {
    if (state.mobileReady || state.selected.size > 0) loadMobileRoute();
    else goMobile('entry');
  });
</script>

</body>
</html>
